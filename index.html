<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳恩鴻老師AI小教室 - 人臉/手部識別篇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <script>
        // 隱藏 TF Lite 例行 info（唔影響真正錯誤）
        const originalConsoleError = console.error;
        console.error = function(...args) {
            const msg = args.join(' ');
            if (msg.includes('TensorFlow Lite XNNPACK delegate for CPU') || msg.includes('INFO: Created TensorFlow Lite')) {
                return;
            }
            originalConsoleError.apply(console, args);
        };
    </script>

    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        #canvas-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            pointer-events: none;
        }

        /* 鏡射統一由 JS 控制（canvasCtx），唔再喺 CSS 翻轉，避免雙重翻轉混亂 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 遊戲層唔鏡像（文字/數字唔會反） */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(1);
            z-index: 20;
        }

        .bar-container { margin-bottom: 6px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; }
        .bar-bg { height: 6px; background: #334155; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.1s linear; }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            pointer-events: auto;
            transition: all 0.3s;
        }

        .btn {
            background: #334155;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            pointer-events: auto;
        }
        .btn:hover { background: #475569; transform: translateY(-2px); }
        .btn.active { background: #2563eb; color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .score-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); color: #fbbf24; }
            100% { transform: scale(1); }
        }

        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; background: white; }
            100% { opacity: 0; }
        }
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .modal-enter { animation: modalIn 0.3s ease-out forwards; }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 校徽 logo */
        #logo-bar { display: flex; align-items: center; gap: 10px; }
        #logo-bar img {
            height: 52px; width: auto; object-fit: contain;
            background: rgba(255,255,255,0.92);
            border-radius: 10px; padding: 4px;
        }

        /* 開場 3-2-1 倒數 */
        #countdown-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9rem; font-weight: 900;
            color: #fbbf24; text-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 35; pointer-events: none;
        }
        .cd-anim { animation: cdpop 0.6s ease-out; }
        @keyframes cdpop {
            0% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
        }

        /* 目標表情大 emoji */
        #big-emoji {
            font-size: 6rem; line-height: 1;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
            animation: bob 1.2s ease-in-out infinite;
        }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .timer-danger { color: #f87171 !important; animation: tick 1s steps(1) infinite; }
        @keyframes tick { 50% { opacity: 0.4; } }

        .prop-btn { padding: 6px 12px; font-size: 0.8rem; }
        .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; background: rgba(255,255,255,0.04); }
        .lb-row.me { background: rgba(37,99,235,0.35); border: 1px solid #60a5fa; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>

    <!-- 載入畫面 -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center text-center p-4">
        <div class="loader mb-4" style="width: 50px; height: 50px;"></div>
        <h2 id="txt-loading-title" class="text-xl font-bold text-blue-400">正在啟動 AI 引擎...</h2>
        <p id="txt-loading-desc" class="text-gray-400 text-sm mt-2">請允許攝影機權限</p>
    </div>

    <!-- 模式開場 modal -->
    <div id="intro-modal" class="hidden fixed inset-0 bg-black/80 z-40 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl max-w-md w-full border border-blue-500 text-center shadow-2xl modal-enter pointer-events-auto">
            <div class="text-6xl mb-4" id="intro-icon">👋</div>
            <h3 id="intro-title" class="text-2xl font-bold text-blue-400 mb-2">模式標題</h3>
            <p id="intro-desc" class="text-gray-300 mb-6 text-lg leading-relaxed">模式說明文字</p>
            <div id="intro-name-wrap" class="hidden mb-6">
                <input id="player-name" maxlength="12" placeholder="輸入你的名字"
                    class="w-full text-center text-lg px-4 py-3 rounded-xl bg-slate-900 border border-slate-600 text-white focus:border-blue-400 focus:outline-none" />
                <p id="name-hint" class="text-red-400 text-sm mt-2 hidden">請先輸入名字</p>
            </div>
            <button id="btn-start-intro" onclick="closeIntro()" class="btn bg-blue-600 hover:bg-blue-500 w-full justify-center py-3 text-lg font-bold shadow-lg">
                開始體驗
            </button>
        </div>
    </div>

    <!-- 排行榜 modal -->
    <div id="leaderboard-modal" class="hidden fixed inset-0 bg-black/80 z-40 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl max-w-md w-full border border-yellow-500 shadow-2xl modal-enter pointer-events-auto">
            <h3 id="lb-title" class="text-2xl font-bold text-yellow-400 mb-1 text-center">🏆 排行榜</h3>
            <p id="lb-myscore" class="text-center text-gray-300 mb-4"></p>
            <div id="lb-list" class="max-h-80 overflow-y-auto mb-6"></div>
            <div class="flex gap-3">
                <button id="btn-lb-replay" onclick="lbReplay()" class="btn bg-blue-600 hover:bg-blue-500 flex-1 justify-center py-3 font-bold">再玩一次</button>
                <button id="btn-lb-close" onclick="lbClose()" class="btn flex-1 justify-center py-3">關閉</button>
            </div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="canvas-container">
            <canvas id="output_canvas"></canvas>
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- 倒數 / 大 emoji 疊在中央 -->
        <div id="countdown-overlay" class="hidden">3</div>

        <div id="ui-layer">
            <!-- 頂部列 -->
            <div class="flex justify-between items-start w-full">
                <div class="panel w-auto pr-6 flex items-center gap-3">
                    <!-- 雙校徽 logo（搵唔到檔案會自動隱藏） -->
                    <div id="logo-bar">
                        <img src="assets/logo1.png" alt="school 1" onerror="this.style.display='none'">
                        <img src="assets/logo2.png" alt="school 2" onerror="this.style.display='none'">
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 id="main-title" class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                            陳恩鴻老師AI小教室
                        </h1>
                        <div id="status-text" class="text-xs text-green-400 mt-1 flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span> <span id="txt-status">偵測中</span>
                        </div>
                    </div>
                </div>

                <!-- 右側控制 -->
                <div class="flex flex-col items-end gap-2">
                    <div class="flex gap-2">
                        <button id="mirror-btn" class="btn text-sm py-1 px-3 bg-slate-700 border-slate-500" onclick="toggleMirror()" title="左右鏡射">
                            <span id="mirror-icon">🪞</span>
                        </button>
                        <button id="mute-btn" class="btn text-sm py-1 px-3 bg-slate-700 border-slate-500" onclick="toggleMute()">
                            <span id="mute-icon">🔊</span>
                        </button>
                        <button id="lang-btn" class="btn text-sm py-1 px-3 bg-slate-700 border-slate-500" onclick="toggleLanguage()" title="切換中／English">
                            🌍 <span id="lang-label">中</span>
                        </button>
                    </div>

                    <!-- 計時 chip -->
                    <div id="timer-chip" class="panel hidden py-2 px-4 text-center">
                        <p class="text-[10px] text-gray-400 uppercase tracking-wider" id="txt-time">Time</p>
                        <p id="timer-display" class="text-3xl font-black text-green-400 font-mono">60</p>
                    </div>

                    <!-- 分數 chip -->
                    <div id="score-panel" class="panel hidden py-2 px-4">
                        <div class="text-center">
                            <p class="text-[10px] text-gray-400 uppercase tracking-wider" id="txt-score">Score</p>
                            <p id="score-display" class="text-3xl font-black text-yellow-400 font-mono">0</p>
                        </div>
                    </div>

                    <!-- combo chip -->
                    <div id="combo-chip" class="panel hidden py-1 px-4 text-center">
                        <p class="text-lg font-black text-orange-400">Combo ×<span id="combo-val">1</span></p>
                    </div>

                    <!-- AR 道具切換 -->
                    <div id="ar-bar" class="panel hidden">
                        <p class="text-[10px] text-gray-400 uppercase tracking-wide mb-2" id="txt-arprop">AR 道具</p>
                        <div class="flex gap-2 flex-wrap">
                            <button class="btn prop-btn" data-prop="none" onclick="setArProp('none')"><span id="ar-none">無</span></button>
                            <button class="btn prop-btn" data-prop="glasses" onclick="setArProp('glasses')"><span id="ar-glasses">墨鏡</span></button>
                            <button class="btn prop-btn" data-prop="bunny" onclick="setArProp('bunny')"><span id="ar-bunny">兔耳</span></button>
                            <button class="btn prop-btn" data-prop="hat" onclick="setArProp('hat')"><span id="ar-hat">帽</span></button>
                        </div>
                    </div>

                    <!-- 數據 -->
                    <button id="data-toggle-btn" class="btn text-sm py-1 px-3 hidden" onclick="toggleDataPanel()">
                        <span class="material-icons text-sm">bar_chart</span> <span id="txt-show-data">顯示數據</span>
                    </button>
                    <div id="data-panel" class="panel w-64 hidden">
                        <div class="flex justify-between items-center mb-2">
                            <h3 id="txt-data-title" class="text-sm font-bold text-gray-300">Blendshapes 數據</h3>
                            <button onclick="toggleDataPanel()" class="text-gray-500 hover:text-white"><span class="material-icons text-sm">close</span></button>
                        </div>
                        <div class="mb-4 bg-slate-900/50 rounded-lg p-2 text-center border border-slate-700">
                            <p id="txt-system-judge" class="text-[10px] text-gray-400 uppercase tracking-wide mb-1">系統判定</p>
                            <p id="expression-status" class="text-lg font-bold text-gray-400">無表情</p>
                        </div>
                        <div class="bar-container"><div class="bar-label"><span id="lbl-jaw">張嘴 (JawOpen)</span><span id="val-jaw">0.0</span></div><div class="bar-bg"><div id="bar-jaw" class="bar-fill bg-red-500"></div></div></div>
                        <div class="bar-container"><div class="bar-label"><span id="lbl-smile">微笑 (Smile)</span><span id="val-smile">0.0</span></div><div class="bar-bg"><div id="bar-smile" class="bar-fill bg-yellow-500"></div></div></div>
                        <div class="bar-container"><div class="bar-label"><span id="lbl-brow">皺眉 (BrowDown)</span><span id="val-brow">0.0</span></div><div class="bar-bg"><div id="bar-brow" class="bar-fill bg-purple-500"></div></div></div>
                        <div class="bar-container"><div class="bar-label"><span id="lbl-blink">眨眼 (Blink)</span><span id="val-blink">0.0</span></div><div class="bar-bg"><div id="bar-blink" class="bar-fill bg-blue-500"></div></div></div>
                    </div>
                </div>
            </div>

            <!-- 中央指示 -->
            <div class="flex flex-col items-center gap-3 flex-grow justify-end pb-16">
                <div id="big-emoji" class="hidden">😃</div>
                <div id="instruction-box" class="px-8 py-4 bg-black/70 rounded-2xl backdrop-blur-md border border-white/20 text-2xl font-bold text-yellow-300 hidden text-center transition-all shadow-lg">
                    請張開嘴巴！
                </div>

                <!-- 模式列：兩組 -->
                <div class="panel flex flex-col gap-2 max-w-full">
                    <div class="flex items-center gap-2 overflow-x-auto">
                        <span class="text-xs text-gray-400 w-10 shrink-0" id="grp-face">臉部</span>
                        <button class="btn mode-btn active" onclick="setMode('mesh')"><span class="material-icons text-sm">grid_on</span> <span id="btn-mode-mesh">數據透視</span></button>
                        <button class="btn mode-btn" onclick="setMode('filter')"><span class="material-icons text-sm">auto_fix_high</span> <span id="btn-mode-filter">濾鏡體驗</span></button>
                        <button class="btn mode-btn" onclick="setMode('mimic')"><span class="material-icons text-sm">emoji_emotions</span> <span id="btn-mode-mimic">表情挑戰</span></button>
                    </div>
                    <div class="flex items-center gap-2 overflow-x-auto">
                        <span class="text-xs text-gray-400 w-10 shrink-0" id="grp-hand">手部</span>
                        <button class="btn mode-btn" onclick="setMode('handmesh')"><span class="material-icons text-sm">back_hand</span> <span id="btn-mode-handmesh">骨架透視</span></button>
                        <button class="btn mode-btn" onclick="setMode('fingers')"><span class="material-icons text-sm">looks_one</span> <span id="btn-mode-fingers">手指數數</span></button>
                        <button class="btn mode-btn" onclick="setMode('rps')"><span class="material-icons text-sm">sports_mma</span> <span id="btn-mode-rps">剪刀石頭布</span></button>
                        <button class="btn mode-btn" onclick="setMode('draw')"><span class="material-icons text-sm">brush</span> <span id="btn-mode-draw">空中塗鴉</span></button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="absolute bottom-4 left-4 right-4 flex justify-between items-end pointer-events-none">
                <div id="footer-text" class="text-gray-400 text-xs bg-black/30 px-3 py-1 rounded-full backdrop-blur-sm pointer-events-auto">
                    此程式由陳恩鴻老師開發
                </div>
                <button class="btn bg-blue-600 hover:bg-blue-500 pointer-events-auto shadow-lg" onclick="takeScreenshot()">
                    <span class="material-icons">photo_camera</span> <span id="btn-screenshot">截圖留念</span>
                </button>
            </div>
        </div>
    </div>

        const SoundEngine = {
            ctx: null, bgmInterval: null, rainNode: null, isPlayingRain: false, muted: false,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone(freq, type, duration, vol = 0.1, startTime = 0) {
                if (this.muted) return;
                if (!this.ctx) this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime + startTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime + startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + startTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime + startTime);
                osc.stop(this.ctx.currentTime + startTime + duration);
            },
            playSuccess() { this.playTone(1200, 'sine', 0.1, 0.1); this.playTone(1800, 'sine', 0.4, 0.1, 0.1); },
            playScore() { this.playTone(800, 'triangle', 0.1, 0.05); },
            playFail() { this.playTone(150, 'sawtooth', 0.5, 0.2); },
            playBeep() { this.playTone(600, 'square', 0.12, 0.07); },
            playGo() { this.playTone(1000, 'square', 0.25, 0.09); },
            playSunSound() {
                this.playTone(261.63, 'sine', 1.5, 0.05, 0); this.playTone(329.63, 'sine', 1.5, 0.05, 0.1);
                this.playTone(392.00, 'sine', 1.5, 0.05, 0.2); this.playTone(523.25, 'sine', 1.5, 0.05, 0.3);
            },
            playShutter() {
                if (this.muted) return;
                if (!this.ctx) this.init();
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            startRainSound() {
                if (this.isPlayingRain || !this.ctx || this.muted) return;
                this.isPlayingRain = true;
                const bufferSize = 2 * this.ctx.sampleRate;
                const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                this.rainNode = this.ctx.createBufferSource();
                this.rainNode.buffer = noiseBuffer; this.rainNode.loop = true;
                const gain = this.ctx.createGain(); gain.gain.value = 0.05;
                const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
                this.rainNode.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                this.rainNode.start();
            },
            stopRainSound() {
                if (this.rainNode) { try { this.rainNode.stop(); } catch (e) {} this.rainNode = null; }
                this.isPlayingRain = false;
            },
            // 表情挑戰背景音樂（輕快 8-bit 循環，低音量）
            startBGM() {
                if (this.bgmInterval || this.muted) return;
                let note = 0;
                const notes = [262, 0, 330, 392, 0, 330, 294, 0, 262, 0, 330, 0, 392, 440, 392, 0];
                this.bgmInterval = setInterval(() => {
                    if (this.muted) return;
                    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
                    const freq = notes[note % notes.length];
                    if (freq > 0) this.playTone(freq, 'square', 0.12, 0.03);
                    note++;
                }, 200);
            },

        async function startCamera() {
            const constraintsHigh = { video: { width: 1280, height: 720, facingMode: "user" } };
            const constraintsLow = { video: true };
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { handleCameraError({ name: "BrowserNotSupported" }); return; }

            async function getStream(constraints) {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                return new Promise((resolve, reject) => {
                    const handleLoaded = () => { cleanup(); video.play().then(() => resolve(true)).catch(err => { console.warn("播放被阻擋，繼續：", err); resolve(true); }); };
                    const handleError = (e) => { cleanup(); reject(e); };
                    const cleanup = () => {
                        video.removeEventListener('loadeddata', handleLoaded);
                        video.removeEventListener('loadedmetadata', handleLoaded);
                        video.removeEventListener('error', handleError);
                        clearTimeout(timeoutId);
                    };
                    if (video.readyState >= 2) { handleLoaded(); return; }
                    video.addEventListener('loadeddata', handleLoaded);
                    video.addEventListener('loadedmetadata', handleLoaded);
                    video.addEventListener('error', handleError);
                    const timeoutId = setTimeout(() => {
                        if (video.readyState >= 1) handleLoaded();
                        else { cleanup(); reject(new Error("Video load timeout")); }
                    }, 5000);
                });
            }

            try { await getStream(constraintsHigh); }
            catch (err) {
                try { await getStream(constraintsLow); }
                catch (fallbackErr) { handleCameraError(fallbackErr); return; }
            }

            loadingOverlay.style.display = "none";
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            predictWebcam();
            showIntro('mesh');
        }

            else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') errorMsg = "找不到可用的攝影機裝置";

            const tips = isFileProtocol

            canvasElement.width = finalW; canvasElement.height = finalH;

        function drawVideoProp(ctx, vid, targetW, targetH) {
            const vidRatio = vid.videoWidth / vid.videoHeight;
            const targetRatio = targetW / targetH;
            let sx, sy, sw, sh;
            if (vidRatio > targetRatio) { sh = vid.videoHeight; sw = sh * targetRatio; sy = 0; sx = (vid.videoWidth - sw) / 2; }
            else { sw = vid.videoWidth; sh = sw / targetRatio; sx = 0; sy = (vid.videoHeight - sh) / 2; }
            ctx.drawImage(vid, sx, sy, sw, sh, 0, 0, targetW, targetH);
        }

        // ========== 主迴圈 ==========
        function predictWebcam() {
            const now = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                try {
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

                    canvasCtx.save();
                    if (mirrored) { canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1); }

                    if (isHandMode(currentMode)) {
                        if (currentMode === 'handmesh') canvasCtx.filter = 'grayscale(70%) brightness(60%)';
                        drawVideoProp(canvasCtx, video, canvasElement.width, canvasElement.height);
                        canvasCtx.filter = 'none';

                        if (!handLandmarker) {
                            canvasCtx.restore();
                            gameText(getText('hand_loading'), '#fbbf24');
                            window.requestAnimationFrame(predictWebcam);
                            return;
                        }
                        const res = handLandmarker.detectForVideo(video, now);
                        latestHandResults = res;
                        runHandMode(res);
                        canvasCtx.restore();
                    } else {
                        if (currentMode === 'mesh') canvasCtx.filter = 'grayscale(80%) brightness(50%)';
                        drawVideoProp(canvasCtx, video, canvasElement.width, canvasElement.height);
                        if (currentMode === 'filter') { determineFilterState(); drawFilterOverlays(); }

        // ========== 濾鏡 ==========
        function determineFilterState() {
            const jawOpen = currentBlendshapes['jawOpen'] || 0;
            const smile = (currentBlendshapes['mouthSmileLeft'] + currentBlendshapes['mouthSmileRight']) / 2;

                if (!v) { nameHint.classList.remove('hidden'); return; }
                playerName = v;
            }
            introModal.classList.add('hidden');
            isIntroOpen = false;
            if (currentMode === 'mimic') startMimicGame();
            else if (currentMode === 'rps') { rpsWins = 0; updateScore(0); startRpsRound(); }
        };

        window.setMode = (mode) => {
            currentMode = mode;
            SoundEngine.init();
            stopMimic(); stopFilterSounds();
            clearInterval(rpsTimer); clearTimeout(rpsNextTimer); rpsState = 'idle';

            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const span = document.getElementById(MODE_BTN[mode]);
            if (span) span.closest('.mode-btn')?.classList.add('active');

            // 隱藏所有浮動 UI
            [dataPanel, scorePanel, timerChip, comboChip, arBar].forEach(el => el.classList.add('hidden'));
            dataToggleBtn.classList.add('hidden');
            instructionBox.classList.add('hidden'); bigEmoji.classList.add('hidden');
            gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            particles = []; rainDrops = []; bursts = []; drawStrokes = []; currentStroke = null;

            if (mode === 'mesh') dataToggleBtn.classList.remove('hidden');
            else if (mode === 'filter') { arBar.classList.remove('hidden'); window.setArProp(arProp); showInstruction(getText('instr_filter_intro')); }
            else if (mode === 'mimic') scorePanel.classList.remove('hidden');
            else if (mode === 'rps') { scorePanel.classList.remove('hidden'); rpsWins = 0; updateScore(0); }
            else if (mode === 'draw') showInstruction(getText('draw_intro'));

            if (isHandMode(mode)) ensureHandLandmarker();
            showIntro(mode);
        };

        window.toggleDataPanel = () => {
            if (dataPanel.classList.contains('hidden')) { dataPanel.classList.remove('hidden'); dataToggleBtn.classList.add('hidden'); }
            else { dataPanel.classList.add('hidden'); dataToggleBtn.classList.remove('hidden'); }
        };

        function showInstruction(text, flash = false) {
            instructionBox.innerText = text; instructionBox.classList.remove('hidden');
            if (flash) {
                instructionBox.classList.add('scale-110', 'bg-yellow-500', 'text-black');
                setTimeout(() => instructionBox.classList.remove('scale-110', 'bg-yellow-500', 'text-black'), 300);
            }
        }

        window.toggleMirror = () => {
            mirrored = !mirrored;
            localStorage.setItem('aifacelab_mirror', mirrored ? '1' : '0');
            document.getElementById('mirror-btn').classList.toggle('active', mirrored);
        };

        window.toggleMute = () => {
            SoundEngine.muted = !SoundEngine.muted;
            localStorage.setItem('aifacelab_muted', SoundEngine.muted ? '1' : '0');
            document.getElementById('mute-icon').innerText = SoundEngine.muted ? '🔇' : '🔊';
            if (SoundEngine.muted) { SoundEngine.stopBGM(); SoundEngine.stopRainSound(); }
            else if (mimicRunning) SoundEngine.startBGM();
        };

        window.takeScreenshot = () => {
            SoundEngine.playShutter();
            const flash = document.getElementById('flash-overlay');
            flash.style.animation = 'none'; void flash.offsetWidth; flash.style.animation = 'flash 0.3s ease-out';
            const cap = document.createElement('canvas');
            cap.width = canvasElement.width; cap.height = canvasElement.height;
            const ctx = cap.getContext('2d');
            ctx.drawImage(canvasElement, 0, 0); // 已是顯示方向（鏡射與否都正確）
            ctx.drawImage(gameCanvas, 0, 0);
            const link = document.createElement('a');
            link.download = `ai-face-lab-${Date.now()}.png`; link.href = cap.toDataURL('image/png'); link.click();
        };

        // ========== 啟動 ==========
        SoundEngine.muted = localStorage.getItem('aifacelab_muted') === '1';
        document.getElementById('mute-icon').innerText = SoundEngine.muted ? '🔇' : '🔊';
        document.getElementById('mirror-btn').classList.toggle('active', mirrored);
        createFaceLandmarker();
    </script>
</body>
</html>
